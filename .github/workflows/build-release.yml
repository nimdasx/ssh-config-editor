name: "Build and Release"

on:
  push:
    tags:
      - 'v*' # Automatically trigger build when pushing a version tag like "v1.0.0"
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub CI/CD Web UI

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: x86_64-apple-darwin
          - os: macos-latest
            rust-target: aarch64-apple-darwin
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Automatically reads the version from package.json
          releaseName: 'SSH Config Manager v__VERSION__'
          releaseBody: 'See the "Assets" list below to download the appropriate installer file for your OS.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust-target }}
